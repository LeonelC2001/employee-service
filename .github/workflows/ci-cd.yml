name: CI — Build, Test & Push

on:
  push:
    branches:
      - develop
      - main
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - develop
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: employee-service
  JAVA_VERSION: "17"

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Unit Tests + Coverage
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests & JaCoCo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Needed for SonarCloud blame analysis

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests & generate coverage report
        run: ./mvnw verify -B

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ─────────────────────────────────────────────
  # Job 2 — SonarCloud Analysis
  # ─────────────────────────────────────────────
sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && secrets.SONAR_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests for Sonar
        run: ./mvnw verify -B

      - name: SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=invex_employee-service \
            -Dsonar.organization=invex \
            -Dsonar.host.url=https://sonarcloud.io \
            -B

  # ─────────────────────────────────────────────
  # Job 3 — Docker Build & Push to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
          TAG="${BRANCH}-${SHORT_SHA}"
          echo "image-tag=${TAG}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Set up Docker Buildx (layer cache)
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.TAG }}
          format: table
          exit-code: "1"          # Fail CI if CRITICAL CVEs found
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────
  # Job 4 — Deploy to DEV (auto on develop branch)
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: http://employee-dev.your-domain.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply dev Kubernetes manifests
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          # Replace placeholders in manifest
          sed -e "s|\${ECR_REGISTRY}|${ECR_REGISTRY}|g" \
              -e "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" \
              k8s/dev/manifest.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/employee-service \
            -n employee-dev --timeout=180s

  # ─────────────────────────────────────────────
  # Job 5 — Deploy to PROD (manual approval on main)
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → PROD
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production           # Requires manual approval in GitHub Environments
      url: https://employee.your-domain.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Inject secrets from AWS Secrets Manager
        run: |
          # Pull secrets from AWS Secrets Manager and create K8s Secret
          DB_URL=$(aws secretsmanager get-secret-value \
            --secret-id employee-service/prod/db-url \
            --query SecretString --output text)
          DB_USER=$(aws secretsmanager get-secret-value \
            --secret-id employee-service/prod/db-user \
            --query SecretString --output text)
          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id employee-service/prod/db-password \
            --query SecretString --output text)
          APP_USER=$(aws secretsmanager get-secret-value \
            --secret-id employee-service/prod/app-user \
            --query SecretString --output text)
          APP_PASS=$(aws secretsmanager get-secret-value \
            --secret-id employee-service/prod/app-password \
            --query SecretString --output text)

          kubectl create secret generic employee-service-secret \
            --from-literal=DB_URL="${DB_URL}" \
            --from-literal=DB_USER="${DB_USER}" \
            --from-literal=DB_PASSWORD="${DB_PASSWORD}" \
            --from-literal=APP_ADMIN_USER="${APP_USER}" \
            --from-literal=APP_ADMIN_PASSWORD="${APP_PASS}" \
            -n employee-prod \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply prod Kubernetes manifests
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          sed -e "s|\${ECR_REGISTRY}|${ECR_REGISTRY}|g" \
              -e "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" \
              k8s/prod/manifest.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/employee-service \
            -n employee-prod --timeout=300s

      - name: Verify deployment health
        run: |
          kubectl get pods -n employee-prod -l app=employee-service
          kubectl get hpa -n employee-prod
