# ──────────────────────────────────────────────────────────────────────────
# PROD namespace — RDS MySQL, AWS Secrets Manager, HPA, strict resources
# ──────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Namespace
metadata:
  name: employee-prod
  labels:
    environment: prod
    app: employee-service

---
# ConfigMap — prod overrides
apiVersion: v1
kind: ConfigMap
metadata:
  name: employee-service-config
  namespace: employee-prod
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"

---
# Secret — values injected by CI/CD from AWS Secrets Manager
# DO NOT commit real values. The pipeline populates them with:
#   kubectl create secret generic employee-service-secret \
#     --from-literal=DB_URL=... \
#     --from-literal=DB_USER=... \
#     --from-literal=DB_PASSWORD=... \
#     --from-literal=APP_ADMIN_USER=... \
#     --from-literal=APP_ADMIN_PASSWORD=... \
#     -n employee-prod --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: employee-service-secret
  namespace: employee-prod
type: Opaque
stringData:
  DB_URL: "PLACEHOLDER_REPLACED_BY_PIPELINE"
  DB_USER: "PLACEHOLDER_REPLACED_BY_PIPELINE"
  DB_PASSWORD: "PLACEHOLDER_REPLACED_BY_PIPELINE"
  APP_ADMIN_USER: "PLACEHOLDER_REPLACED_BY_PIPELINE"
  APP_ADMIN_PASSWORD: "PLACEHOLDER_REPLACED_BY_PIPELINE"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
  namespace: employee-prod
  labels:
    app: employee-service
    environment: prod
  annotations:
    # Records the deploying actor and commit SHA for auditing
    deployment.kubernetes.io/deployed-by: github-actions
spec:
  replicas: 2                    # Minimum HA replicas; HPA scales up from here
  selector:
    matchLabels:
      app: employee-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: employee-service
        environment: prod
    spec:
      # Spread pods across availability zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: employee-service
      containers:
        - name: employee-service
          image: ${ECR_REGISTRY}/employee-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: employee-service-config
            - secretRef:
                name: employee-service-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: log-volume
              mountPath: /var/log/employee-service
          # Security hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: log-volume
          emptyDir: {}
      # Graceful shutdown
      terminationGracePeriodSeconds: 60

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: employee-service
  namespace: employee-prod
spec:
  selector:
    app: employee-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: employee-service-hpa
  namespace: employee-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

---
# Pod Disruption Budget — ensures at least 1 pod is up during node drains
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: employee-service-pdb
  namespace: employee-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: employee-service

---
# Ingress (AWS ALB — HTTPS with ACM certificate)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: employee-service
  namespace: employee-prod
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with your ACM certificate ARN
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/CERT_ID
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:REGION:ACCOUNT:regional/webacl/WAF_NAME/WAF_ID
spec:
  rules:
    - host: employee.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 80
