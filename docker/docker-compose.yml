version: "3.9"

# ─── Local Development Environment ───────────────────────────────────────────
# Runs the app with H2 in-memory DB (same as dev profile).
# Usage:
#   docker compose up --build
#   docker compose down -v

services:
  employee-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: employee-service:local
    container_name: employee-service-dev
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./logs:/var/log/employee-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - employee-net

