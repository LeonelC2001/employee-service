spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true

server:
  port: 8080

# Security credentials come from AWS Secrets Manager via env vars
app:
  security:
    username: ${APP_ADMIN_USER}
    password: ${APP_ADMIN_PASSWORD}

logging:
  level:
    com.invex.employees: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/employee-service/app.log

# Actuator — restrict in prod
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
