spring:
  datasource:
    url: jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080

app:
  security:
    username: admin
    password: admin123

logging:
  level:
    com.invex.employees: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
  file:
    name: logs/employee-service-dev.log
